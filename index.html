<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <title>Coleção Cromos</title>

  <!-- FONTES -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>



  <header>

    <div>
      <div class="logo">Mundial 2026</div>
      <div class="subtitle">COLEÇÃO DE CROMOS</div>
    </div>

    <div class="stats-bar">

      <div class="stat">
        <div class="stat-val green" id="s-have">0</div>
        <div class="stat-lbl">Tenho</div>
      </div>

      <div class="stat">
        <div class="stat-val red" id="s-miss">0</div>
        <div class="stat-lbl">Faltam</div>
      </div>

      <div class="stat">
        <div class="stat-val gold" id="s-total">0</div>
        <div class="stat-lbl">Total</div>
      </div>

      <div class="progress-bar-wrap">

        <div class="progress-label">
          <span>Progresso</span>
          <span id="s-pct">0%</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

      </div>

    </div>

  </header>


  <div class="controls">

    <input
      type="text"
      id="search"
      placeholder="Pesquisar país..."
      oninput="filterTable()"
    >

    <button
      class="filter-btn active"
      onclick="setFilter('all', this)"
    >
      Todos
    </button>

    <button
      class="filter-btn"
      onclick="setFilter('missing', this)"
    >
      Só em falta
    </button>

    <button
      class="filter-btn"
      onclick="setFilter('complete', this)"
    >
      Completos
    </button>

    <span class="save-badge" id="save-badge">
      ✓ Guardado
    </span>

    <button class="reset-btn" onclick="resetAll()">
      Reiniciar tudo
    </button>

  </div>


  <main>


    <div class="section-title">
      Seleções — Cromos 1 a 20
    </div>


    <div class="table-wrap">

      <table id="main-table">

        <thead>

          <tr id="header-row">

            <th>País</th>
            <th class="th-have">Tenho</th>
            <th class="th-miss">Faltam</th>

  

          </tr>

        </thead>

        <tbody id="tbody">


        </tbody>

      </table>

    </div>



    <div class="fwc-section">

      <div class="section-title">
        Cromos Especiais FWC
      </div>

      <div class="fwc-grid" id="fwc-grid">



      </div>

    </div>

  </main>


  <footer>
    Clica nos cromos para alternar entre ✓ e ✕
    &nbsp;·&nbsp;
    Progresso guardado automaticamente no browser
  </footer>



  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
